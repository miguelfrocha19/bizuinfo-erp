<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Gerenciar Categorias</title>

    <h:outputStylesheet library="css"
                        name="estilo.css"/>
</h:head>

<h:body>

    <h:form id="formCategorias">

        <p:panel header="Gestão de Categorias"
                 styleClass="card">

            <p:commandButton
                    value="Nova Categoria"
                    icon="pi pi-plus"
                    type="button"
                    styleClass="p-mb-3"/>

            <p:dataTable value="#{categoriaBean.categorias}"
                         var="c"
                         emptyMessage="Nenhuma categoria cadastrada">

                <p:column headerText="ID">
                    <h:outputText value="#{c.id}"/>
                </p:column>

                <p:column headerText="Nome">
                    <h:outputText value="#{c.nome}"/>
                </p:column>

                <p:column headerText="Ações"
                          style="width:180px">

                    <p:commandButton
                            value="Editar"
                            icon="pi pi-pencil"
                            type="button"/>

                    <p:spacer width="5"/>

                    <p:commandButton
                            value="Excluir"
                            icon="pi pi-trash"
                            type="button"/>

                </p:column>

            </p:dataTable>

        </p:panel>

    </h:form>

</h:body>
</html>
