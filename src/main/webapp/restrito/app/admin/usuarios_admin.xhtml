<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<h:head>
    <title>Admin - Usuários BizuInfo</title>

    <h:outputStylesheet library="css" name="estilo.css"/>
</h:head>

<h:body>

    <h:form id="formUsuarios">

        <p:panel header="Gestão de Usuários">

            <p:dataTable value="#{usuarioAdminBean.usuarios}"
                         var="u"
                         paginator="true"
                         rows="10"
                         reflow="true">


                <p:column headerText="ID">
                    #{u.id}
                </p:column>

                <p:column headerText="Nome">
                    #{u.nome}
                </p:column>

                <p:column headerText="Email">
                    #{u.email}
                </p:column>

                <p:column headerText="Perfil">

                    <p:selectOneMenu value="#{u.role}" style="width:150px">

                        <f:selectItem itemLabel="FUNCIONARIO" itemValue="FUNCIONARIO"/>
                        <f:selectItem itemLabel="GERENTE" itemValue="GERENTE"/>
                        <f:selectItem itemLabel="ADMIN" itemValue="ADMIN"/>

                    </p:selectOneMenu>

                </p:column>

                <p:column headerText="Email Verificado">
                    <h:outputText value="#{u.emailVerificado ? 'Sim' : 'Não'}"/>
                </p:column>

                <p:column headerText="Ações">

                    <p:commandButton value="Salvar"
                                     icon="pi pi-save"
                                     action="#{usuarioAdminBean.salvar(u)}"
                                     update="formUsuarios"
                                     process="@this"/>

                </p:column>

            </p:dataTable>

        </p:panel>

    </h:form>

</h:body>
</html>
